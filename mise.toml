[tools]
python = "3.12"
uv = 'latest'

# Automatic virtual environment
[env]
_.python.venv = { path = ".venv", create = true }
PROJECT_NAME = "{{ config_root | basename }}"
VIRTUAL_ENV = "{{ config_root }}/.venv"
PATH = "{{ config_root }}/.venv/bin:{{env.PATH}}"


[settings]
activate_aggressive = true

[tasks.info]
description = "Print project information"
run = '''
echo "Project: $PROJECT_NAME"
echo "Python: $(python --version)"
echo "Virtual env: $VIRTUAL_ENV"
'''

# Dependency management
[tasks.setup]
description = "Install dependencies and create the local virtual environment"
run = "uv sync"

[tasks.add]
description = "Add a new dependency to the project"
run = "uv add {args}"

[tasks.update]
description = "Update project dependencies"
run = "uv sync --upgrade"

# Code quality
[tasks.lint]
description = "Run Ruff linting checks"
run = "uv run ruff check ."

[tasks.format]
description = "Format code with Ruff"
run = "uv run ruff format ."

[tasks.check]
description = "Run linting and tests"
run = "uv run ruff check . && uv run pytest"

[tasks.test]
description = "Run the test suite"
run = "uv run pytest --cov=src --cov-report=xml:coverage.xml"

# Application tasks
[tasks.generate]
description = "Generate Swiss German speech audio"
run = "uv run python -m src.swiss_tts.main"
alias = "gen"

[tasks.docker-build]
description = "Build the Docker image for the Swiss TTS engine"
run = "docker build -t swiss-tts-engine:latest ."
