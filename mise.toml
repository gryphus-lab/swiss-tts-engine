[tools]
python = "3.12"
uv = 'latest'
prettier = 'latest'
java = '21'

# Automatic virtual environment
[env]
_.python.venv = { path = ".venv", create = true }
PROJECT_NAME = "{{ config_root | basename }}"
VIRTUAL_ENV = "{{ config_root }}/.venv"
JAVA_HOME = "{{ mise_data_dir }}/installs/java/21"
ANDROID_HOME = "{{ env.HOME }}/Library/Android/sdk"
ANDROID_SDK_ROOT = "{{ env.HOME }}/Library/Android/sdk"
ANDROID_NDK_HOME = "{{ env.HOME }}/Library/Android/sdk/ndk/27.1.12297006"
PATH = "{{ env.JAVA_HOME }}/bin:{{ config_root }}/.venv/bin:{{env.PATH}}"


[settings]
activate_aggressive = true

[tasks.info]
description = "Print project information"
run = '''
echo "Project: $PROJECT_NAME"
echo "Python: $(python --version)"
echo "Java: $(java -version 2>&1 | head -n 1)"
echo "Virtual env: $VIRTUAL_ENV"
'''

# Dependency management
[tasks.setup]
description = "Install dependencies and create the local virtual environment"
run = ["uv sync --all-packages", "npm install --prefix apps/swiss-tts-app"]

[tasks.add]
description = "Add a new dependency to the project"
run = "uv add {args}"

[tasks.update]
description = "Update project dependencies"
run = "uv sync --upgrade"

# Code quality
[tasks.lint]
description = "Run linting checks with Prettier and Ruff"
run = ["npm run lint --prefix apps/swiss-tts-app", "uv run ruff check ."]

[tasks.format]
description = "Format code with Prettier and Ruff"
run = ["npm run format --prefix apps/swiss-tts-app", "uv run ruff format ."]

[tasks.check]
description = "Run linting and tests"
run = "uv run ruff check . && uv run --package swiss-tts-engine pytest apps/swiss-tts-engine/tests"

[tasks.test]
description = "Run the test suites"
run = [
  "uv run --package swiss-tts-engine pytest apps/swiss-tts-engine/tests --cov=swiss_tts --cov-report=xml:coverage.xml",
  "npm run test --prefix apps/swiss-tts-app",
]

# Application tasks
[tasks.android-preview-build]
description = "Build the Swiss TTS Android preview APK locally"
run = "npm run build:android:preview:local --prefix apps/swiss-tts-app"

[tasks.generate]
description = "Generate Swiss German speech audio"
run = "uv run --package swiss-tts-engine python -m swiss_tts.main"
alias = "gen"

[tasks.docker-build]
description = "Build the Docker image for the Swiss TTS engine"
run = "docker build -t swiss-tts-engine:latest . -f Dockerfile"

[tasks.docker-build-fresh]
description = "Build the Docker image from scratch without cache"
run = "docker build --no-cache -t swiss-tts-engine:latest . -f Dockerfile"

[tasks.docker-compose]
description = "Run the application using Docker Compose"
run = "docker compose up -d"

[tasks.docker-cleanup]
description = "Cleanup the docker containers and remove images"
run = "docker compose down -v --rmi all"

[tasks.docker-app-logs]
description = "Print the mobile app docker logs"
run = "docker compose logs -f swiss-tts-app"
